<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark background -->
  <rect width="128" height="128" rx="20" fill="#323232"/>

  <!-- ===== BICYCLE (upper area, y: 8-64) ===== -->
  <!-- 中心 translate(74, 50), 軽い前傾 rotate(-12) -->
  <g transform="translate(74, 50) rotate(-12)" fill="none" stroke="#cc2211" stroke-linecap="round" stroke-linejoin="round">
    <!-- 後輪 -->
    <circle cx="-16" cy="0" r="15" stroke-width="2.5"/>
    <!-- 前輪 -->
    <circle cx="16" cy="0" r="15" stroke-width="2.5"/>
    <!-- チェーンステー -->
    <line x1="-16" y1="0" x2="0" y2="-6" stroke-width="2.2"/>
    <!-- シートステー -->
    <line x1="-16" y1="0" x2="-3" y2="-22" stroke-width="2.2"/>
    <!-- シートチューブ -->
    <line x1="0" y1="-6" x2="-3" y2="-22" stroke-width="2.2"/>
    <!-- ダウンチューブ -->
    <line x1="0" y1="-6" x2="13" y2="-18" stroke-width="2.2"/>
    <!-- トップチューブ -->
    <line x1="-3" y1="-22" x2="11" y2="-22" stroke-width="2.2"/>
    <!-- ヘッドチューブ -->
    <line x1="11" y1="-22" x2="13" y2="-18" stroke-width="2"/>
    <!-- フォーク -->
    <line x1="13" y1="-18" x2="16" y2="0" stroke-width="2.2"/>
    <!-- ライダー: 上体（前傾）-->
    <line x1="-3" y1="-23" x2="10" y2="-33" stroke-width="3"/>
    <!-- ライダー: 頭 -->
    <circle cx="13" cy="-37" r="5" stroke-width="2.5"/>
    <!-- ライダー: 腕 -->
    <line x1="10" y1="-33" x2="15" y2="-23" stroke-width="2.2"/>
    <!-- ライダー: 前脚 -->
    <line x1="0" y1="-6" x2="5" y2="7" stroke-width="2.2"/>
    <line x1="5" y1="7" x2="10" y2="5" stroke-width="2"/>
    <!-- ライダー: 後ろ脚 -->
    <line x1="0" y1="-6" x2="-6" y2="5" stroke-width="2.2"/>
    <line x1="-6" y1="5" x2="-11" y2="3" stroke-width="2"/>
  </g>

  <!-- ===== GRAPH (lower area, y: 68-116) ===== -->
  <!-- Y軸 (全体) -->
  <line x1="14" y1="10" x2="14" y2="116" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- X軸 -->
  <line x1="12" y1="116" x2="120" y2="116" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- グリッド線 (下部エリアのみ) -->
  <line x1="14" y1="76" x2="118" y2="76" stroke="#505050" stroke-width="0.9"/>
  <line x1="14" y1="92" x2="118" y2="92" stroke="#505050" stroke-width="0.9"/>
  <line x1="14" y1="108" x2="118" y2="108" stroke="#505050" stroke-width="0.9"/>

  <!-- グラフ折れ線 -->
  <polyline
    points="16,110 38,82 62,90 84,71 116,88"
    fill="none"
    stroke="#ffffff"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- 赤プロット点 -->
  <circle cx="16"  cy="110" r="3.5" fill="#cc2211"/>
  <circle cx="38"  cy="82"  r="3.5" fill="#cc2211"/>
  <circle cx="62"  cy="90"  r="3.5" fill="#cc2211"/>
  <circle cx="84"  cy="71"  r="3.5" fill="#cc2211"/>
  <circle cx="116" cy="88"  r="3.5" fill="#cc2211"/>
</svg>
